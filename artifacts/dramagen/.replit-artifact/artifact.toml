kind = "web"
previewPath = "/"
title = "DramaGen"
version = "1.0.0"
id = "artifacts/dramagen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25633

[services.development]
run = "pnpm --filter @workspace/dramagen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dramagen", "run", "build" ]
publicDir = "artifacts/dramagen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25633"
BASE_PATH = "/"
